name: re3 cmake devkitA64 (Nintendo Switch)
on:
  pull_request:
  push:
  release:
    types: published
jobs:
  build-nintendo-switch:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Build OpenAL Soft for Switch
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/kcat/openal-soft.git /tmp/openal-soft
          cmake -S /tmp/openal-soft -B /tmp/openal-build \
            -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/switch-prefix" \
            -DLIBTYPE=STATIC \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_NO_CONFIG_UTIL=ON
          cmake --build /tmp/openal-build --parallel
          cmake --install /tmp/openal-build
      
      - name: Verify OpenAL staged
        shell: bash
        run: |
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/include/AL"
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/lib" | grep -i openal
      
      - name: Build mpg123 for Switch
        shell: bash
        run: |
          set -euxo pipefail
      
          git clone --depth=1 https://github.com/libsdl-org/mpg123.git /tmp/mpg123
          cd /tmp/mpg123
      
          # Generate configure script if needed
          if [ ! -f ./configure ]; then
            ./autogen.sh
          fi
      
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=/opt/devkitpro/devkitA64
          export PATH="$DEVKITA64/bin:$PATH"
      
          export CC=aarch64-none-elf-gcc
          export CXX=aarch64-none-elf-g++
          export AR=aarch64-none-elf-ar
          export RANLIB=aarch64-none-elf-ranlib
          export LD=aarch64-none-elf-ld
          export STRIP=aarch64-none-elf-strip
      
          ./configure \
            --host=aarch64-none-elf \
            --prefix="${GITHUB_WORKSPACE}/switch-prefix" \
            --disable-shared \
            --enable-static \
            --with-cpu=generic \
            --disable-network \
            --disable-debug \
            --disable-ipv6 \
            --disable-modules
      
          make -j"$(nproc)"
          make install


      - name: Verify mpg123 staged
        shell: bash
        run: |
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/include" | grep -i mpg123
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/lib" | grep -Ei 'mpg123|out123|syn123'
                  
      - name: Generate shader includes
        run: |
          cmake -S . -B build-host \
            -DRE3_AUDIO=OAL \
            -DOPENAL_INCLUDE_DIR="${GITHUB_WORKSPACE}/switch-prefix/include" \
            -DOPENAL_LIBRARY="${GITHUB_WORKSPACE}/switch-prefix/lib/libopenal.a" \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/switch-prefix"
          cmake --build build-host --target shaders --parallel
            
      - name: "Build files"
        run: |
          /opt/devkitpro/portlibs/switch/bin/aarch64-none-elf-cmake -S . -B build-switch \
            -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DRE3_AUDIO=OAL \
            -DLIBRW_PLATFORM=GL3 \
            -DLIBRW_GL3_GFXLIB=GLFW \
            -DRE3_WITH_OPUS=False \
            -DRE3_VENDORED_LIBRW=True \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/switch-prefix" \
            -DCMAKE_FIND_ROOT_PATH="${GITHUB_WORKSPACE}/switch-prefix;/opt/devkitpro/portlibs/switch;/opt/devkitpro/libnx" \
            -DOPENAL_INCLUDE_DIR="${GITHUB_WORKSPACE}/switch-prefix/include/AL" \
            -DOPENAL_LIBRARY="${GITHUB_WORKSPACE}/switch-prefix/lib/libopenal.a"
          cmake --build build-switch --parallel
      
      - name: "Create binary package (cpack)"
        working-directory: ./build-switch
        run: |
          cpack
      
      - name: "Archive binary package (github artifacts)"
        uses: actions/upload-artifact@v4
        with:
          name: "switch-gl3"
          path: build-switch/*.zip
          if-no-files-found: error
