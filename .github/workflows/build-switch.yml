name: re3 cmake devkitA64 (Nintendo Switch)
on:
  pull_request:
  push:
  release:
    types: published
jobs:
  build-nintendo-switch:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Build OpenAL Soft for Switch
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/kcat/openal-soft.git /tmp/openal-soft
          cmake -S /tmp/openal-soft -B /tmp/openal-build \
            -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/switch-prefix" \
            -DLIBTYPE=STATIC \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_NO_CONFIG_UTIL=ON
          cmake --build /tmp/openal-build --parallel
          cmake --install /tmp/openal-build
      
      - name: Verify OpenAL staged
        shell: bash
        run: |
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/include/AL"
          ls -la "${GITHUB_WORKSPACE}/switch-prefix/lib" | grep -i openal
       
      - name: Install switch mpg123 via dkp-pacman
        shell: bash
        run: |
          set -euxo pipefail
          dkp-pacman -Syu --noconfirm switch-mpg123
          test -f /opt/devkitpro/portlibs/switch/lib/libmpg123.a
          test -f /opt/devkitpro/portlibs/switch/include/mpg123.h

      - name: Verify mpg123 from portlibs
        shell: bash
        run: |
          ls -la /opt/devkitpro/portlibs/switch/include | grep -i mpg123
          ls -la /opt/devkitpro/portlibs/switch/lib | grep -Ei 'mpg123|out123|syn123'
      
      - name: Fix shader script permissions
        shell: bash
        run: |
          chmod +x vendor/librw/src/gl/shaders/*.sh
          chmod +x src/extras/shaders/*.sh
      
      - name: Build librw shader includes from vendored librw
        shell: bash
        run: |
          set -euxo pipefail
          cd vendor/librw/src/gl/shaders
          # Build the librw shaders from the vendored source
          make -j$(nproc)
          # Verify key shader files were generated
          ls -lh *.inc
          cd - # back to repo root
      
      - name: Generate re3 shader includes
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p shaders/obj
          
          # Copy all generated librw shaders
          if ls vendor/librw/src/gl/shaders/*.inc 1> /dev/null 2>&1; then
            cp -f vendor/librw/src/gl/shaders/*.inc shaders/obj/
          fi
          
          # Build re3-specific shaders
          if [ -f "shaders/Makefile" ]; then
            cd shaders
            make -j$(nproc)
            cd ..
          fi
          
          # Verify all required shader files exist
          required_shaders=(
            "shaders/obj/neoVehicle_frag.inc"
            "shaders/obj/im2d_vert.inc"
            "shaders/obj/im2d_UV2_vert.inc"
          )
          
          for shader in "${required_shaders[@]}"; do
            if [ ! -f "$shader" ]; then
              echo "ERROR: Missing required shader: $shader"
              ls -lh shaders/obj/*.inc 2>/dev/null || echo "No .inc files found"
              exit 1
            fi
          done
          
          echo "All required shaders generated successfully:"
          ls -lh shaders/obj/*.inc
        
      - name: "Build files"
        run: |
          /opt/devkitpro/portlibs/switch/bin/aarch64-none-elf-cmake -S . -B build-switch \
            -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DRE3_AUDIO=OAL \
            -DLIBRW_PLATFORM=GL3 \
            -DLIBRW_GL3_GFXLIB=GLFW \
            -DRE3_WITH_OPUS=False \
            -DRE3_VENDORED_LIBRW=True \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/switch-prefix;/opt/devkitpro/portlibs/switch" \
            -DCMAKE_FIND_ROOT_PATH="${GITHUB_WORKSPACE}/switch-prefix;/opt/devkitpro/portlibs/switch;/opt/devkitpro/libnx" \
            -DOPENAL_INCLUDE_DIR="${GITHUB_WORKSPACE}/switch-prefix/include/AL" \
            -DOPENAL_LIBRARY="${GITHUB_WORKSPACE}/switch-prefix/lib/libopenal.a"
          cmake --build build-switch --parallel
        
      - name: "Create binary package (cpack)"
        working-directory: ./build-switch
        run: |
          cpack
        
      - name: "Archive binary package (github artifacts)"
        uses: actions/upload-artifact@v4
        with:
          name: "switch-gl3"
          path: build-switch/*.zip
          if-no-files-found: error
